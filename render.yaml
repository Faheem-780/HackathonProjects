services:
  - type: web
    name: snippet-library
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.1-8b-instant
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
